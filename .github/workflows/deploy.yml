name: Build, Push, and Deploy Pokedex Legends

on:
  push:
    branches:
      - release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: thyrail
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            thyrail/pokedex-legends:${{ github.sha }}
            thyrail/pokedex-legends:latest

      - name: Deploy auf Saturn
        uses: appleboy/ssh-action@v1
        with:
          host: 91.99.23.99
          username: atheos
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/docker/pokedex-legends
            docker compose pull
            docker compose up -d
